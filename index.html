<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prime Layer Solutions</title>

<style>

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

/* BODY */
body {
  background: radial-gradient(circle at top, #020617, #000);
  color: white;
}

/* NAVBAR */
nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 20px;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
  position: sticky;
  top: 0;
}

.logo {
  font-size: 22px;
  font-weight: bold;
}

.nav-btn {
  background: #4f46e5;
  border: none;
  padding: 10px 15px;
  color: white;
  font-weight: bold;
  border-radius: 6px;
  cursor: pointer;
}

/* HERO */
.hero {
  text-align: center;
  padding: 80px 20px;
}

.hero h1 {
  font-size: 48px;
  font-weight: bold;
}

.hero p {
  margin-top: 15px;
  color: #aaa;
}

/* MOVING TEXT */
.moving-text {
  display: inline-block;
  color: #00f5ff;
  font-weight: bold;
  margin-top: 15px;
  animation: move 3s infinite alternate ease-in-out;
}

@keyframes move {
  from { transform: translateX(-20px); }
  to { transform: translateX(20px); }
}

/* FORM */
.container {
  max-width: 500px;
  margin: 40px auto;
  padding: 20px;
}

.form-box {
  background: rgba(255,255,255,0.05);
  padding: 25px;
  border-radius: 12px;
  backdrop-filter: blur(15px);
  border: 1px solid rgba(255,255,255,0.1);
}

/* INPUTS */
input, textarea {
  width: 100%;
  padding: 12px;
  margin-bottom: 15px;
  border: 2px solid #4f46e5;
  border-radius: 6px;
  background: transparent;
  color: white;
  font-weight: bold;
}

input:focus, textarea:focus {
  outline: none;
  border-color: #00f5ff;
  box-shadow: 0 0 8px #00f5ff;
}

/* BUTTONS */
button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  font-weight: bold;
  border-radius: 6px;
  cursor: pointer;
}

.email-btn {
  background: #4f46e5;
  color: white;
}

.whatsapp-btn {
  background: #16a34a;
  color: white;
}

/* RESPONSIVE */
@media (max-width: 768px) {
  .hero h1 {
    font-size: 32px;
  }

  .container {
    padding: 10px;
  }
}

</style>

</head>

<body>

<!-- NAV -->
<nav>
  <div class="logo">Prime Layer</div>
  <button class="nav-btn" onclick="scrollToForm()">Schedule</button>
</nav>

<!-- HERO -->
<section class="hero">
  <h1>Prime Layer Solutions</h1>
  <div class="moving-text">Automation • Innovation • Smart Systems</div>
  <p>Building modern digital tools for smart businesses.</p>
</section>

<!-- FORM -->
<div class="container" id="meetingForm">
  <div class="form-box">

    <h2 style="text-align:center;margin-bottom:15px;">Schedule Meeting</h2>

    <input id="title" type="text" placeholder="Meeting Title">
    <input id="date" type="date">
    <input id="time" type="time">
    <textarea id="message" placeholder="Meeting Details"></textarea>
    <input id="emails" type="text" placeholder="Emails (comma separated)">

    <button class="email-btn" onclick="sendEmail()">SEND EMAIL</button>
    <button class="whatsapp-btn" onclick="sendWhatsApp()">SEND WHATSAPP</button>

  </div>
</div>

<script>

function scrollToForm() {
  document.getElementById("meetingForm").scrollIntoView({behavior:"smooth"});
}

function sendEmail() {
  let title = document.getElementById("title").value;
  let date = document.getElementById("date").value;
  let time = document.getElementById("time").value;
  let msg = document.getElementById("message").value;
  let emails = document.getElementById("emails").value;

  if (!emails) {
    alert("Please enter email(s)");
    return;
  }

  let subject = encodeURIComponent("Meeting: " + title);
  let body = encodeURIComponent(
    "Prime Layer Solutions\n\n" +
    "Meeting Title: " + title +
    "\nDate: " + date +
    "\nTime: " + time +
    "\nDetails: " + msg +
    "\n\nPlease check your mailbox for full details."
  );

  window.location.href = `mailto:${emails}?subject=${subject}&body=${body}`;
}

function sendWhatsApp() {
  let title = document.getElementById("title").value;
  let date = document.getElementById("date").value;
  let time = document.getElementById("time").value;

  let text = encodeURIComponent(
    "Prime Layer Solutions\n\n" +
    "New Meeting Scheduled\n\n" +
    title +
    "\nDate: " + date +
    "\nTime: " + time +
    "\n\nPlease check your mailbox for detail about next meeting"
  );

  window.open(`https://wa.me/?text=${text}`, "_blank");
}

</script>

</body>
</html>
