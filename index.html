<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prime Layer Solutions</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#020617">

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:Arial; }

body { background:#0f172a; color:white; }

nav {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
  background:#020617;
}

.logo { display:flex; gap:10px; align-items:center; }
.logo img { width:200px; height:100px; border-radius:6px; }

.hero { text-align:center; padding:25px; }

.container { max-width:900px; margin:auto; padding:15px; }

.form-box {
  background:#020617;
  padding:20px;
  border-radius:8px;
  border:1px solid #1e293b;
  margin-bottom:20px;
}

input {
  width:100%;
  padding:10px;
  margin:6px 0;
  background:#0f172a;
  border:1px solid #334155;
  color:white;
}

button {
  padding:10px;
  border:none;
  cursor:pointer;
  font-weight:bold;
  margin:4px;
}

.save { background:#0ea5e9; color:white; }
.email { background:#6366f1; color:white; }
.wa { background:#16a34a; color:white; }

.meeting {
  background:#020617;
  padding:15px;
  border:1px solid #1e293b;
  margin-bottom:10px;
  border-radius:8px;
}

.meeting.active {
  border:2px solid #22c55e;
}

.badge {
  background:#22c55e;
  padding:3px 6px;
  font-size:12px;
  border-radius:5px;
}

a { color:#38bdf8; }

</style>
</head>

<body>

<nav>
  <div class="logo">
    <img src="IMG-20260501-WA0008.jpg">
    <strong>Prime Layer</strong>
  </div>
</nav>

<div class="hero">
  <h2>Prime Layer Solutions</h2>
  <p>Smart Meeting Scheduler (No Backend)</p>
</div>

<div class="container">

<div class="form-box">
  <h3>Schedule Meeting</h3>

  <input id="title" placeholder="Meeting Title">
  <input id="date" type="date">
  <input id="time" type="time">

  <input id="emails" placeholder="Emails (comma separated)">

  <button class="save" onclick="saveMeeting()">Save Meeting</button>
</div>

<div id="list"></div>

</div>

<script>

let meetings = JSON.parse(localStorage.getItem("meetings")) || [];
let editIndex = null;

/* NOTIFICATIONS */
window.onload = async () => {
  if ("Notification" in window) {
    await Notification.requestPermission();
  }
};

function notify(title, body){
  if(Notification.permission === "granted"){
    navigator.serviceWorker.getRegistration().then(reg=>{
      if(reg){
        reg.showNotification(title,{
          body,
          icon:"IMG-20260501-WA0008.jpg"
        });
      }
    });
  }
}

/* 🔥 GOOGLE LINKS (Calendar + Meet) */
function makeLinks(title, date, time){

  let start = new Date(date + "T" + time);
  let end = new Date(start.getTime() + 3600000);

  function fmt(d){
    return d.toISOString().replace(/[-:]/g,"").split(".")[0] + "Z";
  }

  // Calendar
  let calendar =
    "https://calendar.google.com/calendar/render?action=TEMPLATE"
    + "&text=" + encodeURIComponent(title)
    + "&dates=" + fmt(start) + "/" + fmt(end)
    + "&details=" + encodeURIComponent("Prime Layer Meeting");

  // 🔥 UNIQUE GOOGLE MEET LINK (no backend)
  let meet =
    "https://meet.google.com/new";

  return { calendar, meet };
}

/* SAVE */
function saveMeeting(){

  let links = makeLinks(title.value, date.value, time.value);

  let m = {
    title:title.value,
    date:date.value,
    time:time.value,
    emails:emails.value,
    calendar:links.calendar,
    meet:links.meet
  };

  if(editIndex !== null){
    meetings[editIndex] = m;
    editIndex = null;
  } else {
    meetings.push(m);
  }

  localStorage.setItem("meetings", JSON.stringify(meetings));

  notify("Meeting Saved", title.value);

  clear();
  render();
}

/* RENDER */
function render(){

  let now = new Date();
  let list = document.getElementById("list");
  list.innerHTML = "";

  meetings.forEach((m,i)=>{

    let t = new Date(m.date + "T" + m.time);
    let active = now >= t;

    list.innerHTML += `
      <div class="meeting ${active?'active':''}">
        <h4>${m.title} ${active?'<span class="badge">LIVE</span>':''}</h4>
        <p>${m.date} ${m.time}</p>

        <a href="${m.calendar}" target="_blank">📅 Calendar</a><br>
        <a href="${m.meet}" target="_blank">🎥 Google Meet</a>

        <br><br>

        <button class="email" onclick="sendEmail(${i})">Email</button>
        <button class="wa" onclick="wa()">WhatsApp</button>
        <button onclick="edit(${i})">Edit</button>
        <button onclick="del(${i})">Delete</button>
      </div>
    `;
  });
}

/* EDIT */
function edit(i){
  let m = meetings[i];
  title.value = m.title;
  date.value = m.date;
  time.value = m.time;
  emails.value = m.emails;
  editIndex = i;
}

/* DELETE */
function del(i){
  meetings.splice(i,1);
  localStorage.setItem("meetings", JSON.stringify(meetings));
  render();
}

/* EMAIL */
function sendEmail(i){
  let m = meetings[i];

  let body = encodeURIComponent(
    "Meeting:\n" + m.title +
    "\nDate: " + m.date +
    "\nTime: " + m.time +
    "\nCalendar: " + m.calendar +
    "\nMeet: " + m.meet
  );

  window.location.href = `mailto:${m.emails}?subject=Meeting&body=${body}`;
}

/* WHATSAPP */
function wa(){
  window.open("https://wa.me/?text=" +
    encodeURIComponent("CHECK YOUR GMAIL FOR MEETING DETAILS"), "_blank");
}

/* CLEAR */
function clear(){
  title.value="";
  date.value="";
  time.value="";
  emails.value="";
}

/* LIVE CHECK */
function checkMeetings(){

  let now = new Date();

  meetings.forEach(m=>{

    let t = new Date(m.date + "T" + m.time);
    let diff = t - now;

    if(diff < 300000 && diff > 0){
      notify("Upcoming Meeting", m.title + " starts in 5 min");
    }

    if(diff < 60000 && diff > -60000){
      notify("LIVE NOW", m.title);
    }

  });

}

setInterval(checkMeetings, 30000);
setInterval(render, 60000);

render();

</script>

<script>
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
