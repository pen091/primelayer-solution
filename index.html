<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prime Layer Solutions</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:Arial; }

body {
  background:#0f172a;
  color:white;
}

/* NAV */
nav {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
  background:#020617;
}

.logo {
  display:flex;
  align-items:center;
  gap:10px;
}

.logo img {
  width:40px;
  height:40px;
  border-radius:6px;
}

/* HERO */
.hero {
  text-align:center;
  padding:40px 20px;
}

/* CONTAINER */
.container {
  max-width:900px;
  margin:auto;
  padding:20px;
}

/* FORM */
.form-box {
  background:#020617;
  padding:20px;
  border-radius:8px;
  border:1px solid #1e293b;
  margin-bottom:20px;
}

input, textarea {
  width:100%;
  padding:10px;
  margin-bottom:10px;
  background:#0f172a;
  border:1px solid #334155;
  color:white;
}

button {
  padding:10px;
  border:none;
  cursor:pointer;
  font-weight:bold;
  margin-right:5px;
}

.email-btn { background:#6366f1; color:white; }
.whatsapp-btn { background:#16a34a; color:white; }
.save-btn { background:#0ea5e9; color:white; }

/* MEETING LIST */
.meeting {
  background:#020617;
  padding:15px;
  margin-bottom:10px;
  border:1px solid #1e293b;
  border-radius:6px;
}

.meeting h4 { margin-bottom:5px; }

.actions button {
  margin-top:8px;
}

/* RESPONSIVE */
@media(max-width:600px){
  .container { padding:10px; }
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <div class="logo">
    <img src="logo.png">
    <strong>Prime Layer</strong>
  </div>
</nav>

<!-- HERO -->
<div class="hero">
  <h2>Prime Layer Solutions</h2>
  <p>Meeting Scheduler System</p>
</div>

<!-- FORM -->
<div class="container">

  <div class="form-box">
    <h3>Schedule Meeting</h3>

    <input id="title" placeholder="Meeting Title">
    <input id="date" placeholder="Date Setup" type="date">
    <input id="time" placeholder["Time Setup" type="time">
    <textarea id="message" placeholder="Details"></textarea>
    <input id="emails" placeholder="Emails (comma separated)">

    <button class="save-btn" onclick="saveMeeting()">Save Meeting</button>
  </div>

  <!-- LIST -->
  <div id="meetingList"></div>

</div>

<script>

let meetings = JSON.parse(localStorage.getItem("meetings")) || [];
let editIndex = null;

function saveMeeting(){
  let meeting = {
    title: title.value,
    date: date.value,
    time: time.value,
    message: message.value,
    emails: emails.value
  };

  if(editIndex !== null){
    meetings[editIndex] = meeting;
    editIndex = null;
  } else {
    meetings.push(meeting);
  }

  localStorage.setItem("meetings", JSON.stringify(meetings));
  clearForm();
  renderMeetings();
}

function renderMeetings(){
  let list = document.getElementById("meetingList");
  list.innerHTML = "";

  meetings.forEach((m, index) => {
    list.innerHTML += `
      <div class="meeting">
        <h4>${m.title}</h4>
        <p>${m.date} - ${m.time}</p>
        <p>${m.message}</p>

        <div class="actions">
          <button onclick="sendEmail(${index})" class="email-btn">Email</button>
          <button onclick="sendWhatsApp()" class="whatsapp-btn">WhatsApp</button>
          <button onclick="editMeeting(${index})">Edit</button>
          <button onclick="deleteMeeting(${index})">Delete</button>
        </div>
      </div>
    `;
  });
}

function editMeeting(index){
  let m = meetings[index];

  title.value = m.title;
  date.value = m.date;
  time.value = m.time;
  message.value = m.message;
  emails.value = m.emails;

  editIndex = index;
}

function deleteMeeting(index){
  meetings.splice(index,1);
  localStorage.setItem("meetings", JSON.stringify(meetings));
  renderMeetings();
}

function sendEmail(index){
  let m = meetings[index];

  let subject = encodeURIComponent("Meeting: " + m.title);
  let body = encodeURIComponent(
    "Prime Layer Solutions\n\n" +
    "Title: " + m.title +
    "\nDate: " + m.date +
    "\nTime: " + m.time +
    "\nDetails: " + m.message
  );

  window.location.href = `mailto:${m.emails}?subject=${subject}&body=${body}`;
}

function sendWhatsApp(){
  let text = encodeURIComponent(
    "CHECK YOUR MAILBOX FOR DETAILS ABOUT NEXT MEETING SCHEDULE"
  );

  window.open(`https://wa.me/?text=${text}`, "_blank");
}

function clearForm(){
  title.value = "";
  date.value = "";
  time.value = "";
  message.value = "";
  emails.value = "";
}

renderMeetings();

</script>

</body>
</html>
