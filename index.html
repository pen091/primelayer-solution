<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prime Layer Solutions</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:Arial; }

body {
  background:#0f172a;
  color:white;
}

nav {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
  background:#020617;
}

.logo {
  display:flex;
  align-items:center;
  gap:10px;
}

.logo img {
  width:250px;
  height:100px;
  border-radius:6px;
}

.hero {
  text-align:center;
  padding:40px 20px;
}

.container {
  max-width:900px;
  margin:auto;
  padding:20px;
}

.form-box {
  background:#020617;
  padding:20px;
  border-radius:8px;
  border:1px solid #1e293b;
  margin-bottom:20px;
}

input, textarea {
  width:100%;
  padding:10px;
  margin-bottom:10px;
  background:#0f172a;
  border:1px solid #334155;
  color:white;
}

button {
  padding:10px;
  border:none;
  cursor:pointer;
  font-weight:bold;
  margin-right:5px;
}

.email-btn { background:#6366f1; color:white; }
.whatsapp-btn { background:#16a34a; color:white; }
.save-btn { background:#0ea5e9; color:white; }

.dropdown { position:relative; }

.dropdown-content {
  display:none;
  position:absolute;
  width:100%;
  background:#020617;
  border:1px solid #334155;
  padding:10px;
  max-height:150px;
  overflow-y:auto;
  z-index:10;
}

.meeting {
  background:#020617;
  padding:15px;
  margin-bottom:10px;
  border:1px solid #1e293b;
  border-radius:6px;
  transition:0.3s;
}

.meeting.active {
  border:2px solid #22c55e;
  box-shadow:0 0 15px #22c55e55;
}

.badge {
  background:#22c55e;
  padding:3px 8px;
  font-size:12px;
  border-radius:4px;
  margin-left:10px;
}

.actions button {
  margin-top:8px;
}

@media(max-width:600px){
  .container { padding:10px; }
}
</style>
</head>

<body>

<nav>
  <div class="logo">
    <img src="IMG-20260501-WA0008.jpg">
    <strong>Prime Layer</strong>
  </div>
</nav>

<div class="hero">
  <h2>Prime Layer Solutions</h2>
  <p>Smart Meeting Scheduler</p>
</div>

<div class="container">

  <div class="form-box">
    <h3>Schedule Meeting</h3>

    <input id="title" placeholder="Meeting Title">

    <label>Date</label>
    <input id="date" type="date">

    <label>Time</label>
    <input id="time" type="time">

    <!-- EMAIL -->
    <div class="dropdown">
      <input id="emails" placeholder="Select emails" readonly onclick="toggleDropdown()">

      <div id="emailDropdown" class="dropdown-content">
        <label><input type="checkbox" value="osinachimbakamma@gmail.com"> osinachimbakamma@gmail.com</label><br>
        <label><input type="checkbox" value="gabrialogbonna49@gmail.com"> gabrielogbonna49@gmail.com</label><br>
        <label><input type="checkbox" value="princeekenendioziri@gmail.com"> princeekenendioziri@gmail.com</label><br>
      </div>
    </div>

    <button class="save-btn" onclick="saveMeeting()">Save Meeting</button>
  </div>

  <div id="meetingList"></div>

</div>

<script>

let meetings = JSON.parse(localStorage.getItem("meetings")) || [];
let editIndex = null;

/* GOOGLE CALENDAR + MEET LINK */
function generateLinks(title, date, time){

  if(!date || !time) return { calendar:"", meet:"" };

  let start = new Date(date + "T" + time);
  let end = new Date(start.getTime() + 60 * 60 * 1000);

  function format(d){
    return d.toISOString().replace(/-|:|\.\d\d\d/g,"");
  }

  let calendar = "https://calendar.google.com/calendar/render?action=TEMPLATE"
    + "&text=" + encodeURIComponent(title)
    + "&dates=" + format(start) + "/" + format(end)
    + "&details=" + encodeURIComponent("Meeting via Prime Layer Solutions");

  let meet = "https://meet.google.com/new"; // no backend required

  return { calendar, meet };
}

/* SAVE */
function saveMeeting(){

  let links = generateLinks(title.value, date.value, time.value);

  let meeting = {
    title: title.value,
    date: date.value,
    time: time.value,
    calendar: links.calendar,
    meet: links.meet,
    emails: emails.value
  };

  if(editIndex !== null){
    meetings[editIndex] = meeting;
    editIndex = null;
  } else {
    meetings.push(meeting);
  }

  localStorage.setItem("meetings", JSON.stringify(meetings));
  clearForm();
  renderMeetings();
}

/* RENDER */
function renderMeetings(){

  let now = new Date();
  let list = document.getElementById("meetingList");
  list.innerHTML = "";

  meetings.forEach((m, index) => {

    let meetingTime = new Date(m.date + "T" + m.time);
    let isActive = now >= meetingTime;

    list.innerHTML += `
      <div class="meeting ${isActive ? "active" : ""}">
        <h4>${m.title} ${isActive ? '<span class="badge">LIVE</span>' : ''}</h4>
        <p>${m.date} - ${m.time}</p>

        <a href="${m.calendar}" target="_blank" style="color:#38bdf8;">
          Open Calendar
        </a><br>

        <a href="${m.meet}" target="_blank" style="color:#22c55e;">
          Join Google Meet
        </a>

        <div class="actions">
          <button onclick="sendEmail(${index})" class="email-btn">Email</button>
          <button onclick="sendWhatsApp()" class="whatsapp-btn">WhatsApp</button>
          <button onclick="editMeeting(${index})">Edit</button>
          <button onclick="deleteMeeting(${index})">Delete</button>
        </div>
      </div>
    `;
  });
}

/* EDIT (RESTORED) */
function editMeeting(index){
  let m = meetings[index];

  title.value = m.title;
  date.value = m.date;
  time.value = m.time;
  emails.value = m.emails;

  editIndex = index;
}

/* DELETE */
function deleteMeeting(index){
  meetings.splice(index,1);
  localStorage.setItem("meetings", JSON.stringify(meetings));
  renderMeetings();
}

/* EMAIL */
function sendEmail(index){
  let m = meetings[index];

  let subject = encodeURIComponent("Meeting: " + m.title);
  let body = encodeURIComponent(
    "Meeting Details\n\n" +
    "Title: " + m.title +
    "\nDate: " + m.date +
    "\nTime: " + m.time +
    "\n\nCalendar: " + m.calendar +
    "\nMeet: " + m.meet
  );

  window.location.href = `mailto:${m.emails}?subject=${subject}&body=${body}`;
}

/* WHATSAPP */
function sendWhatsApp(){
  window.open("https://wa.me/?text=" + encodeURIComponent(
    "CHECK YOUR GMAIL FOR DETAILS ABOUT NEXT MEETING SCHEDULE"
  ), "_blank");
}

/* FORM CLEAR */
function clearForm(){
  title.value = "";
  date.value = "";
  time.value = "";
  emails.value = "";
}

/* EMAIL DROPDOWN */
function toggleDropdown(){
  let d = document.getElementById("emailDropdown");
  d.style.display = d.style.display === "block" ? "none" : "block";
}

document.querySelectorAll("#emailDropdown input").forEach(cb=>{
  cb.addEventListener("change", ()=>{
    let selected = [];
    document.querySelectorAll("#emailDropdown input:checked")
      .forEach(c=>selected.push(c.value));
    emails.value = selected.join(",");
  });
});

document.addEventListener("click", function(e){
  let d = document.getElementById("emailDropdown");
  if(!d.contains(e.target) && e.target.id !== "emails"){
    d.style.display = "none";
  }
});

/* AUTO REFRESH ACTIVE STATE */
setInterval(renderMeetings, 60000);

renderMeetings();

</script>

</body>
</html>
