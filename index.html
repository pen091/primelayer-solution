<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prime Layer Solutions</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  background:#0f172a;
  color:white;
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
  background:#020617;
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
}

.logo img{
  width:250px;
  height:100px;
  border-radius:6px;
}

/* HERO */
.hero{
  text-align:center;
  padding:25px;
}

/* CONTAINER */
.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

/* CARD */
.card{
  background:#020617;
  padding:20px;
  border-radius:10px;
  border:1px solid #1e293b;
  margin-bottom:20px;
}

/* INPUT */
input, textarea{
  width:100%;
  padding:10px;
  margin:6px 0;
  background:#0f172a;
  border:1px solid #334155;
  color:white;
  border-radius:5px;
}

/* BUTTON */
button{
  padding:10px;
  border:none;
  cursor:pointer;
  font-weight:bold;
  border-radius:5px;
}

.save-btn{background:#0ea5e9; color:white; width:100%;}
.email-btn{background:#6366f1; color:white;}
.whatsapp-btn{background:#16a34a; color:white;}
.reminder-btn{background:#f59e0b; color:black;}

/* DROPDOWN */
.dropdown-box{
  position:relative;
}

.dropdown{
  display:none;
  position:absolute;
  background:#020617;
  border:1px solid #334155;
  width:100%;
  max-height:200px;
  overflow-y:auto;
  padding:10px;
  border-radius:8px;
  z-index:10;
}

.dropdown label{
  display:block;
  padding:5px;
  cursor:pointer;
}

/* MEETING */
.meeting{
  background:#020617;
  padding:15px;
  border-left:4px solid #0ea5e9;
  margin-top:10px;
  border-radius:6px;
}

/* RESPONSIVE */
@media(max-width:600px){
  .container{padding:10px;}
}
</style>

</head>
<body>

<nav>
  <div class="logo">
    <img src="IMG-20260501-WA0008.jpg">
    <strong>Prime Layer</strong>
  </div>
</nav>

<div class="hero">
  <h2>Prime Layer Solutions</h2>
  <p>AI Smart Meeting Scheduler</p>
</div>

<div class="container">

<!-- FORM -->
<div class="card">

<h3>Create Meeting</h3>

<input id="title" placeholder="Meeting Title">
<input id="date" type="date">
<input id="time" type="time">
<textarea id="message" placeholder="Paste Meeting Link Here"></textarea>

<h4>Select Emails</h4>

<div class="dropdown-box">

  <input id="emails" placeholder="Click to select emails" readonly onclick="toggleDropdown()">

  <div id="emailDropdown" class="dropdown">

    <label><input type="checkbox" value="osinachimbakamma@gmail.com"> osinachimbakamma@gmail.com</label>
    <label><input type="checkbox" value="gabrielogbonna49@gmail.com"> gabrielogbonna49@gmail.com</label>
    <label><input type="checkbox" value="princeekenendioziri@gmail.com"> princeekenendioziri@gmail.com</label>
    <!-- <label><input type="checkbox" value="user4@gmail.com"> user4@gmail.com</label> -->

    <hr style="margin:10px 0; border:0.5px solid #334155;">

    <input id="manualEmail" placeholder="Add custom email">
    <button onclick="addCustomEmail()" type="button">Add</button>

  </div>
</div>

<br>

<button class="save-btn" onclick="saveMeeting()">Save Meeting</button>

</div>

<!-- LIST -->
<div id="meetingList"></div>

</div>

<script>

let meetings = JSON.parse(localStorage.getItem("meetings")) || [];
let editIndex = null;

/* DROPDOWN */
function toggleDropdown(){
  let d = document.getElementById("emailDropdown");
  d.style.display = d.style.display === "block" ? "none" : "block";
}

/* UPDATE EMAILS */
document.querySelectorAll("#emailDropdown input[type='checkbox']").forEach(cb=>{
  cb.addEventListener("change", updateEmails);
});

function updateEmails(){
  let selected = [];

  document.querySelectorAll("#emailDropdown input:checked")
  .forEach(cb=> selected.push(cb.value));

  emails.value = selected.join(", ");
}

/* ADD CUSTOM EMAIL */
function addCustomEmail(){
  let val = manualEmail.value.trim();
  if(!val) return;

  let label = document.createElement("label");
  label.innerHTML = `<input type="checkbox" value="${val}" checked> ${val}`;

  document.getElementById("emailDropdown").appendChild(label);

  manualEmail.value = "";
  updateEmails();
}

/* SAVE OR UPDATE */
function saveMeeting(){

  let meeting = {
    title:title.value,
    date:date.value,
    time:time.value,
    message:message.value,
    emails:emails.value
  };

  if(editIndex !== null){
    meetings[editIndex] = meeting;
    editIndex = null;
  }else{
    meetings.push(meeting);
  }

  localStorage.setItem("meetings", JSON.stringify(meetings));

  clearForm();
  render();
  scheduleAllReminders();
}

/* RENDER */
function render(){

  meetingList.innerHTML = "";

  meetings.forEach((m,i)=>{

    meetingList.innerHTML += `
      <div class="meeting">
        <h4>${m.title}</h4>
        <p>${m.date} - ${m.time}</p>
        <p>${m.message}</p>

        <button class="email-btn" onclick="sendEmail(${i})">Email</button>
        <button class="whatsapp-btn" onclick="sendWhatsApp()">WhatsApp</button>
        <button class="reminder-btn" onclick="setReminder(${i})">AI Reminder</button>
        <button onclick="editMeeting(${i})">Edit</button>
        <button onclick="deleteMeeting(${i})">Delete</button>
      </div>
    `;
  });
}

/* EDIT (FIXED) */
function editMeeting(i){
  let m = meetings[i];

  title.value = m.title;
  date.value = m.date;
  time.value = m.time;
  message.value = m.message;
  emails.value = m.emails;

  editIndex = i;
}

/* DELETE */
function deleteMeeting(i){
  meetings.splice(i,1);
  localStorage.setItem("meetings", JSON.stringify(meetings));
  render();
}

/* EMAIL */
function sendEmail(i){

  let m = meetings[i];

  let subject = encodeURIComponent("Meeting: " + m.title);
  let body = encodeURIComponent(
    "Prime Layer Solutions\n\n" +
    m.title + "\n" +
    m.date + " " + m.time + "\n\n" +
    m.message
  );

  window.location.href =
  `mailto:${m.emails}?subject=${subject}&body=${body}`;
}

/* WHATSAPP */
function sendWhatsApp(){
  window.open(
    "https://wa.me/?text=" +
    encodeURIComponent("CHECK YOUR GMAIL FOR NEXT MEETING DETAILS"),
    "_blank"
  );
}

/* CLEAR */
function clearForm(){
  title.value="";
  date.value="";
  time.value="";
  message.value="";
  emails.value="";
}

/* ========================= */
/* 🔥 FIXED AI REMINDER */
/* ========================= */

function setReminder(i){

  let m = meetings[i];

  let meetingTime = new Date(`${m.date}T${m.time}`).getTime();
  let now = Date.now();

  let diff = meetingTime - now;

  if(diff <= 0){
    alert("Meeting already started");
    return;
  }

  let reminderTime = diff - (10 * 60 * 1000);
  if(reminderTime < 0) reminderTime = diff;

  setTimeout(()=>{
    triggerAlert(m);
  }, reminderTime);
}

/* ALERT ENGINE */
function triggerAlert(m){

  if(Notification.permission === "granted"){
    new Notification("🔔 AI Reminder",{
      body:m.title + " is starting soon"
    });
  }

  let audio = new Audio("https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg");
  audio.play();

  if(navigator.vibrate){
    navigator.vibrate([500,200,500,200,1000]);
  }

  alert("🤖 AI ALERT\n\n" + m.title + " is starting now!");
}

/* AUTO REMINDERS ON LOAD */
function scheduleAllReminders(){
  meetings.forEach((m,i)=>{
    setReminder(i);
  });
}

/* NOTIFICATION PERMISSION */
if("Notification" in window){
  Notification.requestPermission();
}

/* CLOSE DROPDOWN */
document.addEventListener("click",function(e){
  let box=document.querySelector(".dropdown-box");
  if(!box.contains(e.target)){
    emailDropdown.style.display="none";
  }
});

/* INIT */
render();
scheduleAllReminders();

</script>

</body>
</html>
