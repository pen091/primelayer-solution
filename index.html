
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Prime Layer Solutions</title>

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
/* Background */
body {
  background: radial-gradient(circle at top, #020617, #000000);
  color: white;
}

/* Glass effect */
.glass {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.1);
}

/* Moving text */
.moving-text {
  display: inline-block;
  animation: moveSide 4s ease-in-out infinite alternate;
}

@keyframes moveSide {
  from { transform: translateX(-20px); }
  to { transform: translateX(20px); }
}

/* Bold inputs */
.input-bold {
  background: transparent;
  border: 2px solid #6366f1;
  padding: 12px;
  font-weight: bold;
  color: white;
}

.input-bold:focus {
  outline: none;
  border-color: #00f5ff;
  box-shadow: 0 0 10px #00f5ff;
}

/* Buttons */
.btn-custom {
  font-weight: bold;
  padding: 12px;
  border-radius: 8px;
}
</style>

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-black px-4 shadow">
  <span class="navbar-brand mb-0 h1 text-white fw-bold">PrimeLayer</span>
  <button onclick="scrollToForm()" class="btn btn-primary fw-bold">
    Schedule Meeting
  </button>
</nav>

<!-- HERO -->
<section class="text-center py-5">

  <h1 class="display-3 fw-bold">
    Prime Layer Solutions
  </h1>

  <p class="moving-text text-info fw-bold mt-3">
    Smart Systems • Automation • Innovation
  </p>

</section>

<!-- FORM -->
<div id="meetingForm" class="container mt-5 mb-5">
  <div class="glass p-4 rounded-4 shadow-lg">

    <h2 class="text-center fw-bold mb-4">Schedule a Meeting</h2>

    <input id="title" type="text" placeholder="Meeting Title"
      class="form-control input-bold mb-3">

    <input id="date" type="date"
      class="form-control input-bold mb-3">

    <input id="time" type="time"
      class="form-control input-bold mb-3">

    <textarea id="message" placeholder="Meeting Details"
      class="form-control input-bold mb-3"></textarea>

    <input id="emails" type="text"
      placeholder="Emails (comma separated)"
      class="form-control input-bold mb-3">

    <button onclick="sendEmail()" 
      class="btn btn-primary w-100 btn-custom mb-3">
      SEND EMAIL
    </button>

    <button onclick="sendWhatsApp()" 
      class="btn btn-success w-100 btn-custom">
      SEND WHATSAPP
    </button>

  </div>
</div>

<script>
function scrollToForm() {
  document.getElementById("meetingForm").scrollIntoView({behavior:"smooth"});
}

function sendEmail() {
  let title = document.getElementById("title").value;
  let date = document.getElementById("date").value;
  let time = document.getElementById("time").value;
  let msg = document.getElementById("message").value;
  let emails = document.getElementById("emails").value;

  if(!emails){
    alert("Enter at least one email");
    return;
  }

  let subject = encodeURIComponent("Meeting: " + title);
  let body = encodeURIComponent(
    "Prime Layer Solutions\n\n" +
    "Meeting Title: " + title +
    "\nDate: " + date +
    "\nTime: " + time +
    "\nDetails: " + msg +
    "\n\nPlease check your mailbox for full details."
  );

  window.location.href = `mailto:${emails}?subject=${subject}&body=${body}`;
}

function sendWhatsApp() {
  let title = document.getElementById("title").value;
  let date = document.getElementById("date").value;
  let time = document.getElementById("time").value;

  let text = encodeURIComponent(
    "Prime Layer Solutions\n\n" +
    "New Meeting Scheduled\n\n" +
    title +
    "\nDate: " + date +
    "\nTime: " + time +
    "\n\nPlease check your mailbox for detail about next meeting"
  );

  window.open(`https://wa.me/?text=${text}`, "_blank");
}
</script>

</body>
</html>
