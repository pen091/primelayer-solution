<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prime Layer Solutions</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:Arial; }

body {
  background:#0f172a;
  color:white;
}

/* NAV */
nav {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
  background:#020617;
}

.logo {
  display:flex;
  align-items:center;
  gap:10px;
}

.logo img {
  width:40px;
  height:40px;
  border-radius:6px;
}

/* HERO */
.hero {
  text-align:center;
  padding:40px 20px;
}

/* CONTAINER */
.container {
  max-width:900px;
  margin:auto;
  padding:20px;
}

/* FORM */
.form-box {
  background:#020617;
  padding:20px;
  border-radius:8px;
  border:1px solid #1e293b;
  margin-bottom:20px;
}

input, textarea {
  width:100%;
  padding:10px;
  margin-bottom:10px;
  background:#0f172a;
  border:1px solid #334155;
  color:white;
}

button {
  padding:10px;
  border:none;
  cursor:pointer;
  font-weight:bold;
  margin-right:5px;
}

.email-btn { background:#6366f1; color:white; }
.whatsapp-btn { background:#16a34a; color:white; }
.save-btn { background:#0ea5e9; color:white; }

/* DROPDOWN */
.dropdown {
  position:relative;
}

.dropdown-content {
  display:none;
  position:absolute;
  width:100%;
  background:#020617;
  border:1px solid #334155;
  padding:10px;
  max-height:150px;
  overflow-y:auto;
  z-index:10;
}

/* MEETING LIST */
.meeting {
  background:#020617;
  padding:15px;
  margin-bottom:10px;
  border:1px solid #1e293b;
  border-radius:6px;
}

.meeting h4 { margin-bottom:5px; }

.actions button {
  margin-top:8px;
}

/* RESPONSIVE */
@media(max-width:600px){
  .container { padding:10px; }
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <div class="logo">
    <img src="logo.png">
    <strong>Prime Layer</strong>
  </div>
</nav>

<!-- HERO -->
<div class="hero">
  <h2>Prime Layer Solutions</h2>
  <p>Meeting Scheduler System</p>
</div>

<!-- FORM -->
<div class="container">

  <div class="form-box">
    <h3>Schedule Meeting</h3>

    <input id="title" placeholder="Meeting Title">

    <label>Date</label>
    <input id="date" type="date">

    <label>Time</label>
    <input id="time" type="time">

    <!-- GOOGLE CALENDAR LINK INPUT -->
    <input id="calendarLink" placeholder="Google Calendar Link (auto generated)">

    <!-- EMAIL SELECTOR -->
    <div class="dropdown">
      <input id="emails" placeholder="Select emails" readonly onclick="toggleDropdown()">

      <div id="emailDropdown" class="dropdown-content">
        <label><input type="checkbox" value="osinachimbakamma@gmail.com"> osinachimbakamma@gmail.com</label><br>
        <label><input type="checkbox" value="princeekenendioziri@gmail.com"> princeekenendioziri@gmail.com</label><br>
        <label><input type="checkbox" value="gabrielogbonna49@gmail.com"> gabrielogbonna49@gmail.com</label><br>
        <label><input type="checkbox" value="user4@gmail.com"> user4@gmail.com</label>
      </div>
    </div>

    <button class="save-btn" onclick="saveMeeting()">Save Meeting</button>
  </div>

  <!-- LIST -->
  <div id="meetingList"></div>

</div>

<script>

let meetings = JSON.parse(localStorage.getItem("meetings")) || [];
let editIndex = null;

/* AUTO GENERATE GOOGLE CALENDAR LINK */
function generateCalendarLink(title, date, time){

  if(!date || !time) return "";

  let start = new Date(date + "T" + time);
  let end = new Date(start.getTime() + 60 * 60 * 1000);

  function format(d){
    return d.toISOString().replace(/-|:|\.\d\d\d/g,"");
  }

  let url = "https://calendar.google.com/calendar/render?action=TEMPLATE"
    + "&text=" + encodeURIComponent(title)
    + "&dates=" + format(start) + "/" + format(end)
    + "&details=" + encodeURIComponent("Meeting scheduled via Prime Layer Solutions");

  return url;
}

/* SAVE */
function saveMeeting(){

  let link = generateCalendarLink(title.value, date.value, time.value);
  calendarLink.value = link;

  let meeting = {
    title: title.value,
    date: date.value,
    time: time.value,
    message: link, // store calendar link instead of details text
    emails: emails.value
  };

  if(editIndex !== null){
    meetings[editIndex] = meeting;
    editIndex = null;
  } else {
    meetings.push(meeting);
  }

  localStorage.setItem("meetings", JSON.stringify(meetings));
  clearForm();
  renderMeetings();
}

/* RENDER */
function renderMeetings(){
  let list = document.getElementById("meetingList");
  list.innerHTML = "";

  meetings.forEach((m, index) => {
    list.innerHTML += `
      <div class="meeting">
        <h4>${m.title}</h4>
        <p>${m.date} - ${m.time}</p>

        <a href="${m.message}" target="_blank" style="color:#38bdf8;">
          Open in Google Calendar
        </a>

        <div class="actions">
          <button onclick="sendEmail(${index})" class="email-btn">Email</button>
          <button onclick="sendWhatsApp()" class="whatsapp-btn">WhatsApp</button>
          <button onclick="deleteMeeting(${index})">Delete</button>
        </div>
      </div>
    `;
  });
}

/* DELETE */
function deleteMeeting(index){
  meetings.splice(index,1);
  localStorage.setItem("meetings", JSON.stringify(meetings));
  renderMeetings();
}

/* EMAIL */
function sendEmail(index){
  let m = meetings[index];

  let subject = encodeURIComponent("Meeting: " + m.title);
  let body = encodeURIComponent(
    "Prime Layer Solutions\n\n" +
    "Title: " + m.title +
    "\nDate: " + m.date +
    "\nTime: " + m.time +
    "\n\nOpen Calendar Event:\n" + m.message
  );

  window.location.href = `mailto:${m.emails}?subject=${subject}&body=${body}`;
}

/* WHATSAPP */
function sendWhatsApp(){
  let text = encodeURIComponent(
    "CHECK YOUR GMAIL FOR DETAILS ABOUT NEXT MEETING SCHEDULE"
  );

  window.open(`https://wa.me/?text=${text}`, "_blank");
}

/* CLEAR */
function clearForm(){
  title.value = "";
  date.value = "";
  time.value = "";
  calendarLink.value = "";
  emails.value = "";
}

/* DROPDOWN */
function toggleDropdown(){
  let d = document.getElementById("emailDropdown");
  d.style.display = d.style.display === "block" ? "none" : "block";
}

/* EMAIL SELECT */
document.querySelectorAll("#emailDropdown input").forEach(cb => {
  cb.addEventListener("change", updateEmails);
});

function updateEmails(){
  let selected = [];
  document.querySelectorAll("#emailDropdown input:checked")
    .forEach(cb => selected.push(cb.value));

  document.getElementById("emails").value = selected.join(",");
}

/* CLOSE DROPDOWN */
document.addEventListener("click", function(e){
  let dropdown = document.getElementById("emailDropdown");
  let input = document.getElementById("emails");

  if(!dropdown.contains(e.target) && e.target !== input){
    dropdown.style.display = "none";
  }
});

renderMeetings();

</script>

</body>
</html>
